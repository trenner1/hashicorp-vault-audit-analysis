services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - VAULT_AUDIT_BINARY=/app/vault-audit
      - CORS_ORIGINS=*
      - DATA_DIR=/app/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - API_KEY=${API_KEY:-}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-5}
      - APP_VERSION=${APP_VERSION:-dev}
    volumes:
      - uploads:/app/uploads
      - data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  uploads:
  data:
