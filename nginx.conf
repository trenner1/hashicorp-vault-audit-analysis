server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow very large audit log uploads (Vault logs can exceed 15 GB)
    client_max_body_size 0;

    # SPA routing — send all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API and SSE to backend
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_cache off;
        proxy_buffering off;
        chunked_transfer_encoding on;

        # Long timeouts for large file uploads and slow log analysis jobs
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    location /healthz {
        proxy_pass http://api:8080;
    }
}
