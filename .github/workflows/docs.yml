name: Docs

on:
  release:
    types: [published]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Generate docs redirect
        run: |
          mkdir -p _site
          MODULE=$(grep '^module ' go.mod | awk '{print $2}')
          cat > _site/index.html <<-EOF
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=https://pkg.go.dev/${MODULE}">
          <link rel="canonical" href="https://pkg.go.dev/${MODULE}">
          <p>Redirecting to <a href="https://pkg.go.dev/${MODULE}">pkg.go.dev/${MODULE}</a>&hellip;</p>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
