name: Auto Release on Dependency Updates

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  auto-release:
    name: Create Patch Release for Dependency Updates
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      (contains(github.event.pull_request.labels.*.name, 'dependencies') ||
       github.event.pull_request.user.login == 'dependabot[bot]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cache cargo-edit binary
        id: cache-cargo-edit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-cargo-edit-0.13.1-${{ runner.os }}

      - name: Install cargo-edit
        if: steps.cache-cargo-edit.outputs.cache-hit != 'true'
        run: cargo install cargo-edit --locked --version 0.13.1

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump patch version
        id: bump_version
        run: |
          cargo set-version --bump patch
          NEW_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Commit version bump
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to v${{ steps.bump_version.outputs.new_version }} for dependency updates"
          git push origin main

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump_version.outputs.new_version }}"
          git push origin "v${{ steps.bump_version.outputs.new_version }}"

      - name: Create release notes
        id: release_notes
        run: |
          cat << EOF > release_notes.md
          # Dependency Updates

          This patch release includes dependency updates from PR #${{ github.event.pull_request.number }}.

          **PR Title:** ${{ github.event.pull_request.title }}

          ## Changes
          ${{ github.event.pull_request.body }}

          ## Full Changelog
          View the [full changelog](https://github.com/${{ github.repository }}/compare/v${{ steps.current_version.outputs.version }}...v${{ steps.bump_version.outputs.new_version }})
          EOF

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --field version="v${{ steps.bump_version.outputs.new_version }}"
