name: Auto Release on Dependency Updates

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read
  actions: write

jobs:
  auto-release:
    name: Create Patch Release for Dependency Updates
    runs-on: ubuntu-latest
    concurrency:
      group: auto-release-${{ github.ref }}
      cancel-in-progress: false
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version from latest tag
        id: current_version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Bump patch version
        id: bump_version
        env:
          CURRENT_VERSION: ${{ steps.current_version.outputs.version }}
        run: |
          STRIPPED="${CURRENT_VERSION#v}"
          IFS='.' read -r major minor patch <<< "$STRIPPED"
          patch="${patch:-0}"
          NEW_VERSION="v${major}.${minor}.$((patch + 1))"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Create and push tag
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: |
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: |
          gh workflow run release.yml \
            --field version="$NEW_VERSION"
