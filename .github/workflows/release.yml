name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write release notes
        env:
          RELEASE_VERSION: ${{ steps.get_version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          cat > notes.md << 'NOTES'
          ## vault-audit RELEASE_VERSION_PLACEHOLDER

          HashiCorp Vault audit log analysis CLI.

          ## Installation

          ### Linux (x86_64)
          ```bash
          curl -L https://github.com/REPO_PLACEHOLDER/releases/download/RELEASE_VERSION_PLACEHOLDER/vault-audit-linux-amd64.tar.gz | tar -xz
          sudo mv vault-audit /usr/local/bin/
          ```

          ### macOS (Apple Silicon)
          ```bash
          curl -L https://github.com/REPO_PLACEHOLDER/releases/download/RELEASE_VERSION_PLACEHOLDER/vault-audit-darwin-arm64.tar.gz | tar -xz
          sudo mv vault-audit /usr/local/bin/
          ```

          ### macOS (Intel)
          ```bash
          curl -L https://github.com/REPO_PLACEHOLDER/releases/download/RELEASE_VERSION_PLACEHOLDER/vault-audit-darwin-amd64.tar.gz | tar -xz
          sudo mv vault-audit /usr/local/bin/
          ```

          ### Windows
          Download `vault-audit-windows-amd64.zip` and extract to your PATH.

          See `checksums.txt` for SHA256 hashes.
          NOTES
          sed -i "s|RELEASE_VERSION_PLACEHOLDER|${RELEASE_VERSION}|g" notes.md
          sed -i "s|REPO_PLACEHOLDER|${REPO}|g" notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          gh release create "$RELEASE_VERSION" \
            --title "Release $RELEASE_VERSION" \
            --notes-file notes.md

  build-release:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            archive: vault-audit-linux-amd64.tar.gz
            binary: vault-audit

          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            archive: vault-audit-linux-arm64.tar.gz
            binary: vault-audit

          - goos: darwin
            goarch: amd64
            runner: macos-latest
            archive: vault-audit-darwin-amd64.tar.gz
            binary: vault-audit

          - goos: darwin
            goarch: arm64
            runner: macos-latest
            archive: vault-audit-darwin-arm64.tar.gz
            binary: vault-audit

          - goos: windows
            goarch: amd64
            runner: windows-latest
            archive: vault-audit-windows-amd64.zip
            binary: vault-audit.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build vault-audit
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          go build \
            -ldflags="-s -w -X main.version=${RELEASE_VERSION}" \
            -o "${{ matrix.binary }}" \
            ./cmd/vault-audit/...

      - name: Create archive (Unix)
        if: matrix.goos != 'windows'
        env:
          ARCHIVE: ${{ matrix.archive }}
          BINARY: ${{ matrix.binary }}
        run: |
          tar -czf "$ARCHIVE" "$BINARY"
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Create archive (Windows)
        if: matrix.goos == 'windows'
        env:
          ARCHIVE: ${{ matrix.archive }}
          BINARY: ${{ matrix.binary }}
        run: |
          7z a "$env:ARCHIVE" "$env:BINARY"
          certutil -hashfile "$env:ARCHIVE" SHA256 > "$env:ARCHIVE.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          gh release upload "$RELEASE_VERSION" "$ARCHIVE" "${ARCHIVE}.sha256"
