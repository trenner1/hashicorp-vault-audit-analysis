version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
      aws-sdk:
        patterns:
          - "github.com/aws/*"

  # npm (frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      vite-ecosystem:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
